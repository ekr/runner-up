name = "runnerup-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[r2_buckets]]
binding = "GPX_BUCKET"
bucket_name = "runnerup-gpx"

# Dev-only fallbacks. Production uses: wrangler secret put <NAME>
[vars]
SHARE_SECRET = "test-secret-for-development-only"
AUTH_SECRET = "test-auth-secret-for-development-only"
