name: Post screenshots comment

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: screenshots

      - name: Read PR number
        id: meta
        run: echo "pr_number=$(cat screenshots/.pr-number)" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-screenshots
          number: ${{ steps.meta.outputs.pr_number }}
          path: screenshots/.comment-body.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
