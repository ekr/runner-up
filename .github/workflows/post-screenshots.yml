name: Post screenshots comment

on:
  workflow_run:
    workflows: ["Playwright Tests"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-screenshots
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: screenshots

      - name: Read PR number
        id: meta
        run: |
          if [[ ! -s screenshots/pr-number.txt ]]; then
            echo "pr-number.txt missing or empty" >&2; exit 1
          fi
          pr_number=$(tr -d '[:space:]' < screenshots/pr-number.txt)
          [[ "$pr_number" =~ ^[0-9]+$ ]] || { echo "invalid pr-number: $pr_number" >&2; exit 1; }
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-screenshots
          number: ${{ steps.meta.outputs.pr_number }}
          path: screenshots/comment-body.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
