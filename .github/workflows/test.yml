name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  screenshots:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: PORT=3003 node app.js &

      - name: Wait for server
        run: timeout 60 bash -c 'until curl -fsS http://localhost:3003 >/dev/null 2>&1; do sleep 1; done'

      - name: Capture screenshots
        run: node scripts/capture-screenshots.mjs

      - name: Publish screenshots to pr-screenshots branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: bash scripts/publish-screenshots.sh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Prepare comment metadata
        if: github.event_name == 'pull_request'
        env:
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          echo "$PR_NUMBER" > screenshots/.pr-number
          if [[ "$SAME_REPO" != "true" ]]; then
            SHORT="${PR_SHA:0:7}"
            printf '<!-- pr-screenshots:auto -->\n## Rendered screenshots\n\n_Generated for [`%s`](https://github.com/%s/commit/%s)._\n\nScreenshots are available as a [workflow artifact](https://github.com/%s/actions/runs/%s).\n' \
              "$SHORT" "$GITHUB_REPOSITORY" "$PR_SHA" \
              "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" \
              > screenshots/.comment-body.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: screenshots/
          retention-days: 30
