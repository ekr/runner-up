<!DOCTYPE html>
<html>
<head>
    <title>RunnerUp: Compare GPX Tracks</title>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css"> <style>
    </style>
</head>
<body>
  <div class="logo-container">
    <img src="logo.png" width="200">
  </div>
  <div id="control-bar">
    <div id="add-track">
      <label id="file-label" for="track">Add a GPS track</label><input type="file" id="track">
      <select id="saved-tracks">
        <option value="" disabled selected>Select a saved track...</option>
      </select>
    </div>
    <div id="trim-tracks" style="display: none;">
      <label for="trim-checkbox">Remove non-matching segments </label><input type="checkbox" id="trim-tracks-checkbox">
    </div>
    <div id="display-mode" style="display: none;">
      <span id="alignment-summary"></span>
      <label for="display-mode-select">Show: </label>
      <select id="display-mode-select">
        <option value="full">Full tracks</option>
        <option value="overlapping">Overlapping regions only</option>
      </select>
    </div>
  </div>
  
  <div>
    <div id="map-container">
      <div id="map"></div>
      <div id="legend-container"></div>
    </div>
    <div id="slider-container">
        <input type="range" id="time-slider" min="0" max="100" value="0">
    </div>
    <template id="legend-line">
      <div style="display: flex; align-items: center; margin-bottom: 5px;">
        <button class="delete-button times-button" aria-label="Delete item" title="Delete item">
          &times;
        </button>        
        <div id="legend-icon" style="background-color: red; width: 20px; height: 20px; margin-right: 5px;"></div>
        <span id="legend-text"></span>
      </div>
    </template>
    
  </div>
  <label for="compare-by-menu">Compare by:</label>
    <select name="compare-value" id="compare-by-menu">
        <option value="time">Time</option>
        <option value="distance">Distance</option>
    </select>
  
    <div id="graph"></div>
    <div id="footer">
      <div id="deploy-label">
        Last deployed: <span id="deploy-date"></span>
      </div>
      <div id="license">
        <A HREF="LICENSE.txt">License</A>
      </div>
      <div id="settings">
        <a href="/settings.html">Settings</a>
      </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="settings.js"></script>
    <script src="units.js"></script>
    <script src="utils.js"></script>
    <script src="gpx.js"></script>
    <script src="alignment.js"></script>
    <script src="map.js"></script>
    <script src="graphs.js"></script>
    <script src="script.js"></script>

</body>
</html>
