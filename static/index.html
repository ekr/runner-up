<!DOCTYPE html>
<html>
<head>
    <title>RunnerUp: Compare GPX Tracks</title>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css"> <style>
    </style>
</head>
<body>
  <div class="logo-container">
    <div id="auth-status" style="display: none;">
      <a href="/settings.html" class="header-avatar-link">
        <div id="header-avatar-wrap" class="header-avatar-wrap">
          <img id="header-avatar-img" class="header-avatar-img" alt="Avatar">
          <span id="header-avatar-placeholder" class="header-avatar-placeholder"></span>
        </div>
        <span id="auth-username-display"></span>
      </a>
      <button id="auth-logout-btn" class="secondary-btn">Logout</button>
    </div>
    <img src="logo.png" width="200">
  </div>
  <div id="auth-bar">
    <div id="auth-login-form">
      <input type="text" id="auth-username" placeholder="Username" autocomplete="username">
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <button id="auth-login-btn">Login</button>
      <button id="auth-register-toggle" class="secondary-btn">Register</button>
      <span id="auth-error" class="auth-error"></span>
    </div>
    <div id="auth-register-form" style="display: none;">
      <input type="text" id="reg-username" placeholder="Username" autocomplete="username">
      <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password">
      <input type="text" id="reg-invite" placeholder="Invite code">
      <button id="auth-register-btn">Register</button>
      <button id="auth-back-btn" class="secondary-btn">Back</button>
      <span id="reg-error" class="auth-error"></span>
    </div>
  </div>
  <div id="logged-out-banner" style="display: none;">Not logged in. Tracks will not be stored or shareable.</div>

  <div>
    <details id="add-track" class="overlay-card" open>
      <summary>Add Track</summary>
      <div class="add-track-content">
        <div class="method-group">
          <label id="file-label" for="track">Upload GPX file</label>
          <input type="file" id="track">
        </div>
        <div class="method-group">
          <div id="url-add">
            <input type="url" id="track-url" placeholder="GPX URL" autocomplete="off">
            <button type="button" id="track-url-btn">Add</button>
          </div>
          <span id="track-url-error" class="auth-error"></span>
        </div>
        <div class="method-group js-needs-login">
          <select id="saved-tracks">
            <option value="" disabled selected>Select a saved track...</option>
          </select>
        </div>
      </div>
    </details>
    <div id="map-container">
      <div id="map"></div>
      <div id="overlay-right">

        <div id="display-mode" class="overlay-card" style="display: none;">
          <div id="alignment-summary"></div>
          <div class="display-mode-controls">
            <label for="display-mode-select">Show: </label>
            <select id="display-mode-select">
              <option value="full">Full tracks</option>
              <option value="overlapping">Overlapping regions only</option>
            </select>
          </div>
        </div>

        <div id="legend-container" class="overlay-card"></div>
        <div id="infobox-container" class="overlay-card" style="display: none;"></div>
      </div>
    </div>
    <div id="slider-container">
        <input type="range" id="time-slider" min="0" max="100" value="0">
    </div>
    <template id="legend-line">
      <div class="legend-row">
        <button class="delete-button times-button" aria-label="Delete item" title="Delete item">
          &times;
        </button>
        <div id="legend-icon" class="legend-icon" style="background-color: red;"></div>
        <span id="legend-text" class="legend-text"></span>
        <button class="rename-button" aria-label="Rename track" title="Rename track" style="display: none;">&#x270E;</button>
        <button class="download-button" aria-label="Download GPX" title="Download GPX">&#x2913;</button>
      </div>
    </template>
    
  </div>
  <label for="compare-by-menu">Compare by:</label>
    <select name="compare-value" id="compare-by-menu">
        <option value="time">Time</option>
        <option value="distance">Distance</option>
    </select>
  
    <div id="graph"></div>
    <div id="footer">
      <div id="deploy-label">
        Last deployed: <span id="deploy-date"></span>
      </div>
      <div id="license">
        <A HREF="LICENSE.txt">License</A>
      </div>
      <div id="settings">
        <a href="/settings.html">Settings</a>
      </div>
    </div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="settings.js"></script>
    <script src="units.js"></script>
    <script src="utils.js"></script>
    <script src="gpx.js"></script>
    <script src="alignment.js"></script>
    <script src="map.js"></script>
    <script src="graphs.js"></script>
    <script src="storage.js"></script>
    <script src="infobox.js"></script>
    <script src="script.js"></script>

</body>
</html>
